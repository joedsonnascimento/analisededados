<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de Dados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-btn { background-color: #2563eb !important; color: white !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div class="flex h-screen">
        <!-- Menu Lateral -->
        <aside class="w-64 bg-slate-800 text-white p-6 shadow-xl">
            <h2 class="text-xl font-bold mb-8 border-b border-slate-700 pb-4">Menu de Navegação</h2>
            <nav class="space-y-2">
                <button onclick="switchEntity('Artigo')" id="nav-Artigo" class="w-full text-left p-3 rounded hover:bg-slate-700 transition active-btn">Artigo</button>
                <button onclick="switchEntity('Autores')" id="nav-Autores" class="w-full text-left p-3 rounded hover:bg-slate-700 transition">Autores</button>
                <button onclick="switchEntity('Palavras Chave')" id="nav-Palavras" class="w-full text-left p-3 rounded hover:bg-slate-700 transition">Palavras Chave</button>
                <button onclick="switchEntity('Referências')" id="nav-Referências" class="w-full text-left p-3 rounded hover:bg-slate-700 transition">Referências</button>
            </nav>
        </aside>

        <!-- Área Principal -->
        <main class="flex-1 p-10 overflow-y-auto">
            <h1 class="text-3xl font-extrabold text-gray-800 mb-6">📊 ANALISE DE DADOS</h1>
            
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 id="current-title" class="text-2xl font-semibold mb-6 text-blue-600">Gerenciar Artigo</h2>

                <!-- Tabs -->
                <div class="flex border-b mb-6">
                    <button onclick="switchTab('listar')" id="tab-btn-listar" class="py-2 px-4 border-b-2 border-blue-600 text-blue-600 font-medium">📋 Listar</button>
                    <button onclick="switchTab('inserir')" id="tab-btn-inserir" class="py-2 px-4 border-transparent border-b-2 hover:text-blue-600 transition">➕ Inserir</button>
                </div>

                <div id="tab-listar" class="tab-content active">
                    <div class="overflow-x-auto">
                        <table class="min-w-full bg-white">
                            <thead class="bg-gray-50 border-b">
                                <tr id="table-head"></tr>
                            </thead>
                            <tbody id="table-body" class="divide-y"></tbody>
                        </table>
                    </div>
                </div>

                <div id="tab-inserir" class="tab-content">
                    <form id="crud-form" class="grid grid-cols-1 md:grid-cols-2 gap-4"></form>
                    <button onclick="saveData()" class="mt-6 bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 transition">Salvar Registro</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let db = { "Artigo": [], "Autores": [], "Palavras Chave": [], "Referências": [] };
        let currentEntity = "Artigo";

        const fieldsMap = {
            "Artigo": ["titulo", "ano", "sourche_title", "qt_citacoes", "doi", "issn", "link"],
            "Autores": ["Nome"],
            "Palavras Chave": ["Palavras_Chaves"],
            "Referências": ["Referencia"]
        };

        function switchEntity(entity) {
            currentEntity = entity;
            document.querySelectorAll('aside button').forEach(btn => btn.classList.remove('active-btn'));
            
            // Simplificado para evitar erros de ID
            const safeId = "nav-" + entity.replace(" Chave", ""); 
            const btn = document.getElementById("nav-" + entity);
            if(btn) btn.classList.add('active-btn');

            document.getElementById('current-title').innerText = `Gerenciar ${entity}`;
            renderForm();
            renderTable();
            switchTab('listar');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.querySelectorAll('[id^="tab-btn-"]').forEach(b => b.classList.remove('border-blue-600', 'text-blue-600'));
            document.getElementById(`tab-btn-${tab}`).classList.add('border-blue-600', 'text-blue-600');
        }

        function renderForm() {
            const form = document.getElementById('crud-form');
            form.innerHTML = '';
            fieldsMap[currentEntity].forEach(field => {
                form.innerHTML += `<div><label class="block text-sm font-medium text-gray-700 capitalize">${field.replace('_', ' ')}</label>
                <input type="text" id="field-${field}" class="mt-1 block w-full border rounded-md p-2 shadow-sm"></div>`;
            });
        }

        function saveData() {
            const entry = { id: db[currentEntity].length + 1 };
            fieldsMap[currentEntity].forEach(field => {
                entry[field] = document.getElementById(`field-${field}`).value;
            });
            db[currentEntity].push(entry);
            alert("Salvo!");
            renderTable();
            switchTab('listar');
        }

        function deleteData(id) {
            db[currentEntity] = db[currentEntity].filter(item => item.id !== id);
            renderTable();
        }

        function renderTable() {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            head.innerHTML = '<th class="p-3 text-left">ID</th>';
            body.innerHTML = '';

            const fields = fieldsMap[currentEntity];
            fields.forEach(f => head.innerHTML += `<th class="p-3 text-left capitalize">${f}</th>`);
            head.innerHTML += '<th class="p-3 text-left">Ações</th>';

            if (db[currentEntity].length > 0) {
                db[currentEntity].forEach(row => {
                    let tr = `<td class="p-3">${row.id}</td>`;
                    fields.forEach(f => tr += `<td class="p-3">${row[f] || ''}</td>`);
                    tr += `<td class="p-3"><button onclick="deleteData(${row.id})" class="text-red-600">Excluir</button></td>`;
                    body.innerHTML += `<tr>${tr}</tr>`;
                });
            } else {
                body.innerHTML = '<tr><td colspan="10" class="p-4 text-center">Vazio</td></tr>';
            }
        }

        window.onload = () => { renderForm(); renderTable(); };
    </script>
</body>
</html>
